<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Management Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Lead Management Dashboard</h1>
    </header>
    <main>
        <section>
            <h2>Overview</h2>
            <div id="lead-summary">
                <!-- Lead summary will be generated here -->
            </div>
        </section>
        <section>
            <h2>Lead Table</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Lead entries will be populated here -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Lead Management System</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
